name: Build and Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
      prerelease:
        description: "Mark release as pre-release"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --group dev

      - name: Build app bundle
        run: ./build.sh

      - name: Package .app into a zip
        run: |
          # ditto preserves the bundle structure and ad-hoc code signature
          ditto -c -k --keepParent dist/AutoType.app "AutoType-${{ inputs.tag }}.zip"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ inputs.tag }}" \
            "AutoType-${{ inputs.tag }}.zip" \
            --title "AutoType ${{ inputs.tag }}" \
            --generate-notes \
            ${{ inputs.prerelease == true && '--prerelease' || '' }}
